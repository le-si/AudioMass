<!DOCTYPE html>
<html lang="en">
<head>
	<title>AudioMass - Multitrack Mixer</title>
	<meta charset="utf-8" />
	<style>
	html,body{height:100%}
	body{margin:0;background:#151716;color:#e8e0cf;overflow:hidden;font:12px Arial,sans-serif}
	#m{box-sizing:border-box;height:100%;padding:26px 10px 10px;white-space:nowrap;overflow:auto;background:linear-gradient(#303432,#171918)}
	.s{display:inline-block;position:relative;box-sizing:border-box;width:86px;height:268px;margin-right:8px;padding:8px 7px;vertical-align:top;background:linear-gradient(#424741,#252826);border:1px solid #0a0b0b;border-radius:4px;box-shadow:inset 0 1px #686d66,0 2px 8px #000}
	.s.sel{outline:1px solid #67d4d8;box-shadow:inset 0 1px #686d66,0 0 10px rgba(80,210,220,.35)}
	.s.master{border-color:#615842;background:linear-gradient(#4b473d,#292821)}
	strong{display:block;height:26px;overflow:hidden;white-space:normal;color:#f2ead8;font:13px/13px Arial,sans-serif}
	.meter{height:7px;margin:5px 0 8px;background:#090a0a;border:1px solid #171717;box-shadow:inset 0 1px 3px #000;overflow:hidden}
	.meter i{display:block;height:100%;transform:scaleX(0);transform-origin:0 0;background:linear-gradient(90deg,#58d4d2,#83d36f 62%,#d6bf55 84%,#d35e56)}
	p{margin:0 0 8px}
	button{width:22px;height:22px;margin-right:2px;background:linear-gradient(#252828,#070808);color:#ddd;border:1px solid #0b0c0c;border-radius:3px;box-shadow:inset 0 1px #3b3d3d;cursor:pointer;font:13px Arial}
	button.a{color:#111;background:linear-gradient(#b8f3f3,#48c8cc)}
	label{display:block;color:#aab1b2;font:9px/12px monospace;text-transform:uppercase}
	input{accent-color:#cfc7b5;cursor:pointer}
	.pan{width:70px}
	.vol{position:absolute;left:25px;bottom:42px;width:36px;height:118px;writing-mode:vertical-lr;direction:rtl}
	em,output{display:block;color:#b3b6b1;font:10px/14px monospace;text-align:center}
	output{position:absolute;left:0;right:0;bottom:20px}
	.empty{position:absolute;left:0;right:0;top:50%;margin-top:-9px;color:#4d5250;text-align:center;font:18px Arial;letter-spacing:1px}
	#e,#d,#f{position:absolute;top:7px;right:7px;z-index:9;height:20px;padding:0 6px;background:#eaeaea;color:#111;border-radius:4px;opacity:.9;cursor:pointer;text-align:center;font:9px/20px Arial,sans-serif;user-select:none}
	#e{right:68px;width:10px;display:none}
	#f{left:0;right:0;top:0;width:100%;height:4px;padding:0;border-radius:0;background:#333;display:none;line-height:0}
	.b #e,.b #f{display:block}.b #d{top:12px}.c #f,#f:hover{background:#444}
	</style>
</head>
<body>
	<div id="m"><div class="empty">MULTITRACK MIXER</div></div>
	<a id="d" onclick="dock()">DOCK</a>
	<a id="e" onclick="remove()">X</a>
	<a id="f" onmousedown="return drag(event)"></a>

	<script>
		var d = document;
		var w = window;
		var iframe = location.href.indexOf('?iframe') === -1 ? 0 : 1;
		var box = d.getElementById ('m');
		var sig = '';
		var els = {};
		var last = 0;

		if (iframe) {
			d.body.className = 'b';
			d.getElementById ('d').textContent = 'UNDOCK';
		}

		function host () {
			return iframe ? w.parent : w.opener;
		}

		function mt () {
			var h = host ();
			return h && h.PKAudioEditor && h.PKAudioEditor.multitrack;
		}

		function call ( id, key, val, done ) {
			var m = mt ();
			return m && m.MixerSet && m.MixerSet ( id, key, val, done );
		}

		w.remove = function () {
			var h = host ();
			h && h.PKAudioEditor && h.PKAudioEditor.ui.Dock ('RequestShowFreqAn', 'mix', [1, 1]);
		};

		w.drag = function ( e ) {
			e.preventDefault ();
			e.stopPropagation ();
			w.parent.PKAudioEditor.ui.Dock ('RequestDragI', 'mix', [e.screenX, e.screenY]);
			return false;
		};

		w.dock = function () {
			var h = host ();
			if (!h || !h.PKAudioEditor) return ;
			if (!iframe) {
				h.PKAudioEditor.ui.Dock ('RequestShowFreqAn', 'mix', [1, 1]);
				w.close && w.close ();
				return ;
			}
			var frm = w.parent.document.getElementById ('pk_frmix');
			var t = 1;
			if (frm && frm.getBoundingClientRect) {
				var r = frm.getBoundingClientRect ();
				t = [(w.parent.screenLeft + r.left + 100) || 0, (w.parent.screenTop + r.top + 25) || 0];
			}
			w.parent.PKAudioEditor.ui.Dock ('RequestShowFreqAn', 'mix', [t, 0]);
		};

		function make ( t ) {
			var s = d.createElement ('section');
			var master = t.id === 'master';
			s.className = 's' + (master ? ' master' : '');
			s.innerHTML = master ?
				'<strong></strong><div class="meter"><i></i></div><label>level</label><input class="vol" type="range" min="0" max="1" step=".01"><output></output>' :
				'<strong></strong><div class="meter"><i></i></div><p><button>M</button><button>S</button><button>R</button></p><label>pan <input class="pan" type="range" min="-1" max="1" step=".01"></label><em></em><input class="vol" type="range" min="0" max="1" step=".01"><output></output>';
			s.getElementsByTagName ('strong')[0].textContent = t.name;
			var e = els[t.id] = {
				el:s,
				meter:s.getElementsByTagName ('i')[0],
				vol:s.getElementsByClassName ('vol')[0],
				out:s.getElementsByTagName ('output')[0]
			};
			if (!master) {
				var b = s.getElementsByTagName ('button');
				e.mute = b[0]; e.solo = b[1]; e.rec = b[2];
				e.pan = s.getElementsByClassName ('pan')[0];
				e.panv = s.getElementsByTagName ('em')[0];
				e.mute.onclick = function ( ev ) { ev.stopPropagation (); call ( t.id, 'mute', !e.mute.classList.contains ('a'), 1 ); };
				e.solo.onclick = function ( ev ) { ev.stopPropagation (); call ( t.id, 'solo', !e.solo.classList.contains ('a'), 1 ); };
				e.rec.onclick = function ( ev ) { ev.stopPropagation (); call ( t.id, 'rec', !e.rec.classList.contains ('a'), 1 ); };
				e.pan.oninput = function () { call ( t.id, 'pan', this.value, 0 ); };
				e.pan.onchange = function () { call ( t.id, 'pan', this.value, 1 ); };
				e.pan.ondblclick = function () { this.value = 0; call ( t.id, 'pan', 0, 1 ); };
				s.onclick = function ( ev ) {
					if (/BUTTON|INPUT/.test (ev.target.tagName)) return ;
					call ( t.id, 'select', 1, 1 );
				};
			}
			e.vol.oninput = function () { call ( t.id, 'vol', this.value, 0 ); };
			e.vol.onchange = function () { call ( t.id, 'vol', this.value, 1 ); };
			e.vol.ondblclick = function () { this.value = 1; call ( t.id, 'vol', 1, 1 ); };
			return s;
		}

		function build ( list ) {
			box.innerHTML = '';
			els = {};
			for (var i = 0; i < list.length; ++i) box.appendChild ( make ( list[i] ) );
		}

		function panText ( v ) {
			return v < -0.01 ? 'L ' + ((-v * 100) >> 0) : v > 0.01 ? 'R ' + ((v * 100) >> 0) : 'C';
		}

		function cls ( el, on ) {
			if (el && el._on !== !!on) {
				el._on = !!on;
				el.className = on ? 'a' : '';
			}
		}

		function paint ( t ) {
			var e = els[t.id];
			if (!e) return ;
			if (e.sel !== t.sel) {
				e.sel = t.sel;
				e.el.classList[t.sel ? 'add' : 'remove'] ('sel');
			}
			if (e.meter_v !== t.meter) {
				e.meter_v = t.meter;
				e.meter.style.transform = 'scaleX(' + (t.meter || 0) + ')';
			}
			if (e.vol_v !== t.vol) {
				e.vol_v = t.vol;
				e.vol.value = t.vol;
				e.out.textContent = ((t.vol * 100) >> 0) + '%';
			}
			if (t.id !== 'master') {
				if (e.pan_v !== t.pan) {
					e.pan_v = t.pan;
					e.pan.value = t.pan;
					e.panv.textContent = panText ( t.pan );
				}
				cls ( e.mute, t.mute );
				cls ( e.solo, t.solo );
				cls ( e.rec, t.rec );
			}
		}

		function update () {
			var m = mt ();
			var data = m && m.MixerData && m.MixerData ();
			if (!data || !data.on) {
				if (sig) {
					sig = '';
					box.innerHTML = '<div class="empty">OPEN MULTITRACK</div>';
				}
				return ;
			}
			var list = data.tracks.concat ([{
				id:'master',
				name:'Master',
				vol:data.master.vol,
				meter:data.master.meter
			}]);
			var next = list.map (function ( t ) { return t.id + ':' + t.name; }).join ('|');
			if (next !== sig) {
				sig = next;
				build ( list );
			}
			for (var i = 0; i < list.length; ++i) paint ( list[i] );
		}

		function loop ( t ) {
			if (t - last > 50) {
				last = t;
				update ();
			}
			w.requestAnimationFrame ( loop );
		}

		w.onunload = function () {
			w.destroy && w.destroy ( iframe );
			w.destroy = null;
		};
		w.requestAnimationFrame ( loop );
	</script>
</body>
</html>
